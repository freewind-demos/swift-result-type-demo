name: swift_result_type_demo
options:
  bundleIdPrefix: com.freewind
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  swift_result_type_demo:
    type: application
    platform: macOS
    productName: swift_result_type_demo
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freewind.swiftresulttypedemo
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
    scheme:
      testTargets: []
schemes:
  swift_result_type_demo:
    build:
      targets:
        swift_result_type_demo: all
    run:
      config: Debug
